name: 'Release'

'on':
  'push':
    'branches':
      - 'main'

'permissions':
  'contents': 'write'
  'pull-requests': 'write'
  'packages': 'write'

'env':
  'GITHUB_ACTOR': '${{ github.actor }}'
  'GITHUB_TOKEN': '${{ secrets.GITHUB_TOKEN }}'
  'RELEASE_APP_CONFIGURED': "${{ secrets.RELEASE_APP_ID != '' && secrets.RELEASE_APP_PRIVATE_KEY != '' }}"

'jobs':
  'release-please':
    'runs-on': 'ubuntu-latest'
    'outputs':
      'release_created': '${{ steps.rp.outputs.release_created }}'
      'tag_name': '${{ steps.rp.outputs.tag_name }}'
    'steps':
      - 'uses': 'actions/create-github-app-token@v3'
        'id': 'app-token'
        'continue-on-error': true
        'with':
          'app-id': '${{ secrets.RELEASE_APP_ID }}'
          'private-key': '${{ secrets.RELEASE_APP_PRIVATE_KEY }}'
      - 'uses': 'googleapis/release-please-action@v5'
        'id': 'rp'
        'with':
          'token': '${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}'
          'config-file': 'release-please-config.json'
          'manifest-file': '.release-please-manifest.json'

  'publish-images':
    'name': 'Publish ${{ matrix.image }}'
    'needs': 'release-please'
    'if': "${{ needs.release-please.outputs.release_created == 'true' }}"
    'runs-on': 'ubuntu-latest'
    'permissions':
      'contents': 'read'
      'packages': 'write'
    'strategy':
      'fail-fast': false
      'matrix':
        'include':
          - 'image': 'agent-gateway'
            'dockerfile': 'services/agent-gateway/Dockerfile'
            'platforms': 'linux/amd64'
          - 'image': 'agent-runner'
            'dockerfile': 'services/agent-runner/Dockerfile'
            'platforms': 'linux/amd64'
          - 'image': 'agents-login'
            'dockerfile': 'services/agents-login/Dockerfile'
            'platforms': 'linux/amd64'
    'steps':
      - 'uses': 'actions/checkout@v7'
        'with':
          'ref': '${{ needs.release-please.outputs.tag_name }}'
      - 'uses': 'docker/setup-buildx-action@v4'
      - 'uses': 'docker/login-action@v4'
        'with':
          'registry': 'ghcr.io'
          'username': '${{ github.actor }}'
          'password': '${{ secrets.GITHUB_TOKEN }}'
      - 'uses': 'actions/create-github-app-token@v3'
        'id': 'package-token'
        'if': "${{ env.RELEASE_APP_CONFIGURED == 'true' }}"
        'continue-on-error': true
        'with':
          'app-id': '${{ secrets.RELEASE_APP_ID }}'
          'private-key': '${{ secrets.RELEASE_APP_PRIVATE_KEY }}'
          'owner': '${{ github.repository_owner }}'
          'repositories': |
            agent-kit
            agent-runtime
      - 'uses': 'docker/build-push-action@v7'
        'id': 'build'
        'with':
          'context': '.'
          'file': '${{ matrix.dockerfile }}'
          'platforms': '${{ matrix.platforms }}'
          'push': true
          'tags': |
            ghcr.io/jorisjonkers-dev/agent-runtime/${{ matrix.image }}:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/jorisjonkers-dev/agent-runtime/${{ matrix.image }}:sha-${{ github.sha }}
          'secrets': |
            github_token=${{ secrets.GITHUB_TOKEN }}
            github_actor=${{ github.actor }}
            agent_kit_token=${{ steps.package-token.outputs.token || secrets.GITHUB_TOKEN }}
            agent_kit_actor=${{ steps.package-token.outputs.app-slug && format('{0}[bot]', steps.package-token.outputs.app-slug) || github.actor }}
          'build-args': |
            GIT_SHA=${{ github.sha }}
            AGENT_KIT_RUNTIME_REF=ghcr.io/jorisjonkers-dev/agent-kit/runtime-home:v1.1.0
            AGENT_KIT_VERSION=v1.1.0
      - 'name': 'Write image digest ref'
        'env':
          'IMAGE_REF': 'ghcr.io/jorisjonkers-dev/agent-runtime/${{ matrix.image }}'
          'IMAGE_DIGEST': '${{ steps.build.outputs.digest }}'
          'RELEASE_TAG': '${{ needs.release-please.outputs.tag_name }}'
        'run': |
          set -euo pipefail

          mkdir -p /tmp/image-digest
          printf '%s:%s@%s\n' "$IMAGE_REF" "$RELEASE_TAG" "$IMAGE_DIGEST" > "/tmp/image-digest/${{ matrix.image }}.txt"
      - 'uses': 'actions/upload-artifact@v7'
        'with':
          'name': 'image-digest-${{ matrix.image }}'
          'path': '/tmp/image-digest/${{ matrix.image }}.txt'
          'if-no-files-found': 'error'
          'retention-days': 7

  'image-refs':
    'name': 'Collect Image Refs'
    'needs':
      - 'release-please'
      - 'publish-images'
    'if': "${{ needs.release-please.outputs.release_created == 'true' }}"
    'runs-on': 'ubuntu-latest'
    'outputs':
      'images': '${{ steps.images.outputs.images }}'
    'steps':
      - 'uses': 'actions/download-artifact@v8'
        'with':
          'pattern': 'image-digest-*'
          'path': '/tmp/image-digests'
          'merge-multiple': true
      - 'name': 'Collect digest-pinned image refs'
        'id': 'images'
        'run': |
          set -euo pipefail

          refs="$(cat /tmp/image-digests/*.txt | sort)"
          {
            echo 'images<<EOF'
            printf '%s\n' "$refs"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  'publish-deploy-bundle':
    'name': 'Publish Deploy Bundle'
    'needs':
      - 'release-please'
      - 'image-refs'
    'if': "${{ needs.release-please.outputs.release_created == 'true' }}"
    'runs-on': 'ubuntu-latest'
    'permissions':
      'contents': 'read'
      'packages': 'write'
    'steps':
      - 'uses': 'actions/checkout@v7'
        'with':
          'ref': '${{ needs.release-please.outputs.tag_name }}'
      - 'name': 'Write digest-pinned image lock'
        'env':
          'IMAGE_REFS': '${{ needs.image-refs.outputs.images }}'
        'run': |
          set -euo pipefail

          node - <<'NODE'
          const fs = require('node:fs')
          const images = process.env.IMAGE_REFS.split(/\r?\n/).map((line) => line.trim()).filter(Boolean)
          fs.writeFileSync('/tmp/agent-runtime-images.json', `${JSON.stringify({ images }, null, 2)}\n`)
          NODE
      - 'name': 'Pack deploy bundle'
        'id': 'bundle'
        'uses': 'JorisJonkers-dev/github-workflows/actions/deploy-bundle@v0.8.0'
        'with':
          'package-version': '0.9.0'
          'version': '${{ needs.release-please.outputs.tag_name }}'
          'images': '/tmp/agent-runtime-images.json'
          'node-auth-token': '${{ secrets.GITHUB_TOKEN }}'
      - 'uses': 'oras-project/setup-oras@v2'
      - 'name': 'Log in to GHCR'
        'env':
          'GHCR_TOKEN': '${{ secrets.GITHUB_TOKEN }}'
        'run': 'oras login ghcr.io --username "$GITHUB_ACTOR" --password-stdin <<< "$GHCR_TOKEN"'
      - 'name': 'Publish deploy bundle'
        'env':
          'BUNDLE_PATH': '${{ steps.bundle.outputs.bundle-path }}'
          'BUNDLE_VERSION': '${{ steps.bundle.outputs.bundle-version }}'
        'run': |
          set -euo pipefail

          oras push "ghcr.io/jorisjonkers-dev/agent-runtime-deploy-bundle:${BUNDLE_VERSION}" "$BUNDLE_PATH:application/vnd.jorisjonkers.deployment.bundle.v1+tar"
